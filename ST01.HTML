<html>
    <head>
        <title>countdown timer </title>
    <style>
body{
    font-family: Arial;
    background-color:white
    center;
}
.container
{
    background:grey;
    padding:20px;
    width:350px;
    margin:auto;

    margin-top:80px;
    border:10px;
    border-radius:10px;
}
button{
    padding:10px;
    background-color:red;
    color:white;
    border:none;
    border-radius:5px;
}
#countdown
{
    font-weight :bold;
    margin-top:20px;
}

    </style>        
</head>
<body>
            <div class="container">
                <h2>COUNTDOWN TIMER</h2>
                <input type="number" id="number" placeholder="Enter a number">
             <br><br>
                <button onclick="startCountdown()">Start Countdown</button>

            
            <div id="countdown"></div>
            </div>
            <script>
                function startCountdown(){
               let n=parseInt(document.getElementById("number").value);
              let display =document.getElementById("countdown");
              let countdown=setInterval(()=>{display.innerHTML=n;
            if(n<=0){clearInterval(countdown);
                display.innerHTML="Time over!";}
            n--;
              },1000);}
                          
                  </script>

        </body>
    
</html>
